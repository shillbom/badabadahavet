<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#0ea5e9" />
    <meta
      name="format-detection"
      content="telephone=no, date=no, email=no, address=no"
    />

    <!-- SEO + social sharing. These live in the STATIC HTML (not injected by
         React on mount) on purpose: link-preview scrapers — Messenger,
         WhatsApp, Slack, LinkedIn, X — do not run our JS, so anything set
         client-side would be invisible to them. The app is Swedish-first and
         the canonical host is https://badligan.club. -->
    <meta
      name="description"
      content="Badligan är en liten, vänlig badtävling. Logga dina bad, samla badplatser på kartan, lås upp utmärkelser och tävla med vänner om poäng."
    />
    <link rel="canonical" href="https://badligan.club/" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Facebook, Messenger, WhatsApp, LinkedIn, Slack…) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Badligan" />
    <meta
      property="og:title"
      content="Badligan – en liten, vänlig badtävling"
    />
    <meta
      property="og:description"
      content="Logga dina bad, samla badplatser på kartan, lås upp utmärkelser och tävla med vänner om poäng."
    />
    <meta property="og:url" content="https://badligan.club/" />
    <meta property="og:locale" content="sv_SE" />
    <meta property="og:locale:alternate" content="en_GB" />
    <meta
      property="og:image"
      content="https://badligan.club/web-app-manifest-512x512.png"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="Badligans logotyp" />

    <!-- Twitter / X. `summary` (not summary_large_image) because the share
         image is a square logo, not a 1200×630 banner. Swap to a wide banner
         + summary_large_image if a dedicated OG image is added later. -->
    <meta name="twitter:card" content="summary" />
    <meta
      name="twitter:title"
      content="Badligan – en liten, vänlig badtävling"
    />
    <meta
      name="twitter:description"
      content="Logga dina bad, samla badplatser på kartan, lås upp utmärkelser och tävla med vänner om poäng."
    />
    <meta
      name="twitter:image"
      content="https://badligan.club/web-app-manifest-512x512.png"
    />

    <!-- Structured data: lets Google render a richer result for the app. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Badligan",
        "url": "https://badligan.club/",
        "description": "En liten, vänlig badtävling: logga dina bad, samla badplatser på kartan, lås upp utmärkelser och tävla med vänner om poäng.",
        "applicationCategory": "SportsApplication",
        "operatingSystem": "Web, iOS, Android",
        "inLanguage": ["sv", "en"],
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "SEK"
        },
        "author": {
          "@type": "Person",
          "name": "Simon Hillbom"
        }
      }
    </script>

    <!-- PWA / home screen -->
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Badligan" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- Favicons. Source files live in public/ and Vite copies them as-is.
         The 5 MB SVG export isn't linked — raster PNGs are cheaper at every
         size the browser uses and the SVG just bakes a bitmap inside anyway. -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Warm up the connections the app needs the instant it boots: the auth +
         data backends, and Google Fonts. preconnect opens DNS/TLS early so the
         first auth/Firestore request and the font fetch don't pay handshake
         latency on the critical path. -->
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" />
    <link rel="preconnect" href="https://securetoken.googleapis.com" />
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Map tiles load only after sign-in, so a lighter DNS hint is enough. -->
    <link rel="dns-prefetch" href="https://a.tile.openstreetmap.org" />

    <!-- Fonts loaded here (not via @import inside the bundled CSS) so the
         browser discovers them during HTML parse and fetches them in parallel.
         Loaded async (preload → swap to stylesheet onload) so this third-party
         request never blocks first paint — the splash and body fall back to
         system-ui and swap in the webfont when it arrives (display=swap). -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Caveat+Brush&display=swap"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Caveat+Brush&display=swap"
      />
    </noscript>

    <!-- Boot splash. Pure CSS (no image, no Tailwind) so it paints during
         parse — before any JS downloads or React boots — and never depends on
         the app's chunks. It lives OUTSIDE #root (a sibling overlay) so React
         never clobbers it: the entrance plays uninterrupted, and the app boots
         in #root underneath. A tiny controller (below) removes it with the
         exit animation once the app signals ready (window.__dismissSplash).
         The React <FullSplash> mirrors the resting scene for in-app route
         loads — keep its markup/classes in sync with components/Splash.tsx. -->
    <style>
      /* Tailwind's preflight hasn't loaded yet while this splash shows, so
         zero the UA body margin ourselves — otherwise it shows as a white
         gap above the full-height splash. */
      body {
        margin: 0;
      }
      .app-splash {
        /* Fixed to the viewport so it always covers it exactly (it's also
           the route Suspense fallback, so it can mount under a scroll
           offset, and mobile URL-bar animation makes dvh lag a frame).
           z-index clears Layout's nav/FAB (z-1000/1010) so the boot overlay
           can sit on top of the app and animate away to reveal it. */
        position: fixed;
        inset: 0;
        z-index: 3000;
        display: flex;
        justify-content: center;
        /* wave-50 — the page canvas the app column sits on at wider widths. */
        background: #eff9ff;
      }
      /* Mirror the app's mobile column (Layout uses max-w-md, centered) so
         the very first paint matches the framed column the app renders in. */
      .app-splash__panel {
        /* One tilt angle shared by the water line and the wordmark, so the
           word slides in along the same diagonal the waves sit on. */
        --tilt: -45deg;
        position: relative;
        width: 100%;
        max-width: 28rem;
        height: 100%;
        overflow: hidden;
        /* Sky fading down into water. */
        background: linear-gradient(
          180deg,
          #eff9ff 0%,
          #def1ff 46%,
          #b6e4ff 100%
        );
      }
      @media (min-width: 768px) {
        .app-splash__panel {
          border-left: 1px solid rgba(255, 255, 255, 0.6);
          border-right: 1px solid rgba(255, 255, 255, 0.6);
        }
      }
      /* The waves live in two nested layers: an outer wrapper that the
         intro/exit slide moves as one, and the inner "water" that carries
         the tilt + oversize. Keeping them separate means the entrance can
         translate the wrapper in plain panel-relative units without
         fighting the water's centring/rotate transforms. */
      .app-splash__waves {
        position: absolute;
        inset: 0;
      }
      /* Undulating water: six big off-round discs. Rotating a disc whose
         border-radius isn't a perfect circle makes its top edge rise and
         fall — a wave crest travelling across the panel. The layer is
         tilted by --tilt so the water line runs on the same steep diagonal
         as the wordmark, splitting the panel corner-to-corner: sky in the
         upper-left, water in the lower-right. It's centred on the panel and
         hugely oversized (2×+ each way), so rotating it about the centre
         never uncovers a corner — the panel clips the overflow. Colours run
         light→dark top-to-bottom so the crests read as depth. */
      .app-splash__water {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 220%;
        height: 220%;
        translate: -50% -50%;
        rotate: var(--tilt);
        transform-origin: 50% 50%;
      }
      /* Each disc's crest curvature is the inverse of its size, so the upper,
         crest-defining layers are kept small (tight, wavy arcs) while the
         bottom two stay huge to guarantee the lower-right corner is always
         covered. Strongly non-circular border-radii + differing spin speeds
         and directions make the crests bob and cross for a busy, wavy sea. */
      .app-splash__wave {
        position: absolute;
        left: 50%;
        aspect-ratio: 1 / 1;
        translate: -50% 0;
        transform-origin: 50% 50%;
      }
      .app-splash__wave:nth-child(1) {
        top: 47%;
        width: 120%;
        border-radius: 42% 52% 38% 48% / 50% 40% 52% 42%;
        background: #b6e4ff; /* wave-200 */
        opacity: 0.6;
        animation: app-splash-roll 9s linear infinite;
      }
      .app-splash__wave:nth-child(2) {
        top: 50.5%;
        width: 132%;
        border-radius: 50% 40% 52% 38% / 40% 52% 42% 50%;
        background: #8ed8ff;
        opacity: 0.7;
        animation: app-splash-roll 7s linear infinite reverse;
      }
      .app-splash__wave:nth-child(3) {
        top: 54%;
        width: 148%;
        border-radius: 38% 50% 42% 52% / 52% 42% 50% 40%;
        background: #76d0ff; /* wave-300 */
        opacity: 0.8;
        animation: app-splash-roll 8.5s linear infinite;
      }
      .app-splash__wave:nth-child(4) {
        top: 57%;
        width: 168%;
        border-radius: 48% 40% 52% 42% / 42% 50% 40% 52%;
        background: #2bb8ff; /* wave-400 */
        opacity: 0.85;
        animation: app-splash-roll 6.5s linear infinite reverse;
      }
      .app-splash__wave:nth-child(5) {
        top: 60%;
        width: 200%;
        border-radius: 44% 48% 42% 46%;
        background: #019eea; /* wave-500 */
        animation: app-splash-roll 9.5s linear infinite;
      }
      .app-splash__wave:nth-child(6) {
        top: 63%;
        width: 240%;
        border-radius: 46% 44% 47% 43%;
        background: #007ec6; /* wave-600 */
        animation: app-splash-roll 7s linear infinite reverse;
      }
      /* Wordmark, resting just above the water line and tilted to match it.
         Static by default (the React fallback renders this resting scene);
         the intro/exit modifiers below add the motion. */
      .app-splash__word {
        position: absolute;
        left: 50%;
        bottom: 50%;
        translate: -50% 0;
        rotate: var(--tilt);
        white-space: nowrap;
        font-family:
          "Caveat Brush", "Bricolage Grotesque", system-ui, sans-serif;
        font-size: clamp(3.5rem, 20vw, 5.25rem);
        line-height: 1;
        color: #0264a0; /* wave-700 */
        text-shadow:
          0 2px 0 rgba(255, 255, 255, 0.65),
          0 12px 26px rgba(11, 72, 109, 0.22);
      }
      @keyframes app-splash-roll {
        from {
          rotate: 0deg;
        }
        to {
          rotate: 360deg;
        }
      }

      /* --- Entrance. Played by the first-paint HTML splash (.app-splash--intro)
         only: the water sweeps in from the lower-right corner and the wordmark
         slides up along its own baseline. The React fallback/overlay render the
         resting scene (no --intro), so taking over from the HTML splash doesn't
         restart the motion. --- */
      .app-splash--intro .app-splash__waves {
        animation: app-splash-rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .app-splash--intro .app-splash__word {
        animation: app-splash-slide 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.15s
          both;
      }
      /* Wrapper is panel-sized, so this offset is plain panel-relative units:
         start pushed toward the water corner (down-right) and settle. */
      @keyframes app-splash-rise {
        from {
          opacity: 0;
          translate: 14% 24%;
        }
        to {
          opacity: 1;
          translate: 0 0;
        }
      }
      /* Offset resolved for --tilt: -45° — back down the baseline
         (cos45°·120 ≈ 85 left, sin45°·120 ≈ 85 down). rotate stays at
         --tilt throughout since the keyframes don't touch it. */
      @keyframes app-splash-slide {
        from {
          opacity: 0;
          translate: calc(-50% - 85px) 85px;
        }
        to {
          opacity: 1;
          translate: -50% 0;
        }
      }

      /* --- Exit. The boot overlay lifts away to reveal the app: the whole
         splash fades while the water drains back down the diagonal and the
         wordmark flies on up its baseline. SplashScreen unmounts when the
         root fade ends. --- */
      .app-splash--leaving {
        animation: app-splash-out 0.6s ease both;
        pointer-events: none;
      }
      .app-splash--leaving .app-splash__waves {
        animation: app-splash-rise 0.6s cubic-bezier(0.55, 0, 0.67, 0.2) reverse
          both;
      }
      .app-splash--leaving .app-splash__word {
        animation: app-splash-fly 0.55s cubic-bezier(0.55, 0, 0.67, 0.2) both;
      }
      @keyframes app-splash-out {
        to {
          opacity: 0;
        }
      }
      @keyframes app-splash-fly {
        to {
          opacity: 0;
          translate: calc(-50% + 110px) -110px;
        }
      }

      /* Respect reduced-motion: no rolling/sliding/flying — just the resting
         scene, and a gentle opacity-only fade on exit. */
      @media (prefers-reduced-motion: reduce) {
        .app-splash__wave,
        .app-splash--intro .app-splash__waves,
        .app-splash--intro .app-splash__word,
        .app-splash--leaving .app-splash__waves,
        .app-splash--leaving .app-splash__word {
          animation: none;
        }
      }
    </style>

    <title>Badligan – logga bad, samla badplatser och tävla med vänner</title>
  </head>
  <body class="bg-sky-50">
    <div id="root"></div>
    <!-- Boot splash overlay — sibling of #root so React leaves it alone. -->
    <div id="app-splash" class="app-splash app-splash--intro">
      <div class="app-splash__panel">
        <div class="app-splash__waves" aria-hidden="true">
          <div class="app-splash__water">
            <span class="app-splash__wave"></span>
            <span class="app-splash__wave"></span>
            <span class="app-splash__wave"></span>
            <span class="app-splash__wave"></span>
            <span class="app-splash__wave"></span>
            <span class="app-splash__wave"></span>
          </div>
        </div>
        <div class="app-splash__word">Badligan</div>
      </div>
    </div>
    <script>
      // Splash controller. The app (App.tsx) calls window.__dismissSplash()
      // once it's booted; we then play the exit animation and remove the
      // overlay, revealing the app in #root beneath. A minimum on-screen time
      // guarantees the entrance is actually seen even when boot is instant
      // (warm cache / already signed in).
      (function () {
        var MIN_VISIBLE_MS = 1100; // ~ the entrance duration + a beat
        var start = Date.now();
        window.__dismissSplash = function () {
          var el = document.getElementById("app-splash");
          if (!el || el.dataset.leaving) return;
          var run = function () {
            el.dataset.leaving = "1";
            el.classList.remove("app-splash--intro");
            el.classList.add("app-splash--leaving");
            var remove = function () {
              if (el.parentNode) el.remove();
            };
            el.addEventListener("animationend", function (e) {
              if (e.target === el) remove();
            });
            setTimeout(remove, 1200); // safety net if animationend is missed
          };
          var wait = MIN_VISIBLE_MS - (Date.now() - start);
          wait > 0 ? setTimeout(run, wait) : run();
        };
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
