<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#0ea5e9" />
    <meta
      name="format-detection"
      content="telephone=no, date=no, email=no, address=no"
    />

    <!-- PWA / home screen -->
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Badligan" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- Favicons. Source files live in public/ and Vite copies them as-is.
         The 5 MB SVG export isn't linked — raster PNGs are cheaper at every
         size the browser uses and the SVG just bakes a bitmap inside anyway. -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Warm up the connections the app needs the instant it boots: the auth +
         data backends, and Google Fonts. preconnect opens DNS/TLS early so the
         first auth/Firestore request and the font fetch don't pay handshake
         latency on the critical path. -->
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" />
    <link rel="preconnect" href="https://securetoken.googleapis.com" />
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Map tiles load only after sign-in, so a lighter DNS hint is enough. -->
    <link rel="dns-prefetch" href="https://a.tile.openstreetmap.org" />

    <!-- Fonts loaded here (not via @import inside the bundled CSS) so the
         browser discovers them during HTML parse and fetches them in parallel.
         Loaded async (preload → swap to stylesheet onload) so this third-party
         request never blocks first paint — the splash and body fall back to
         system-ui and swap in the webfont when it arrives (display=swap). -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Caveat+Brush&display=swap"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Caveat+Brush&display=swap"
      />
    </noscript>

    <!-- Boot splash. Lives in the HTML so it paints during parse — before any
         JS downloads or React boots. The styles are inline (not Tailwind) so
         the splash never depends on the app's JS chunks. The <img> being in the
         initial markup also lets the preload scanner fetch it immediately.
         React renders an identical <FullSplash> (same class names) on mount, so
         the handoff is seamless. Keep this in sync with components/Splash.tsx. -->
    <style>
      /* Tailwind's preflight hasn't loaded yet while this splash shows, so
         zero the UA body margin ourselves — it would show as a white border
         around the full-bleed artwork. */
      body {
        margin: 0;
      }
      .app-splash {
        position: relative;
        display: flex;
        min-height: 100dvh;
        flex-direction: column;
        align-items: center;
        /* The wordmark sits in the calm water between the trophy (ends
           ~26% down the artwork) and the swim ring (starts ~43%). */
        justify-content: flex-start;
        overflow: hidden;
        padding-top: 30dvh;
        /* Tiny blurred inline preview (~1 KB) paints with the very first
           frame; the real splash.webp fades in over it when it arrives.
           Same artwork, so the crossfade is seamless. */
        background: #b6e4ff
          url("data:image/webp;base64,UklGRtgCAABXRUJQVlA4WAoAAAAgAAAAEwAAGAAASUNDUMgBAAAAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAAAQAAAACZmYAAPKnAAANWQAAE9AAAApbAAAAAAAAAABtbHVjAAAAAAAAAAEAAAAMZW5VUwAAACAAAAAcAEcAbwBvAGcAbABlACAASQBuAGMALgAgADIAMAAxADZWUDgg6gAAABAGAJ0BKhQAGQA+tVCkS6cko6GoCqjgFolsAJ0y4iOYl/PVAFUdi+kxLiLHjPsVgLdPffwLQm/EAAD+4m/B9B3o7qVtBjd2ukaavn/2UX6RANHhj0mKjgmJGsCo43lmsKyGNnALPLK/+b0bycm7hm8TTvoucf0id5UmtC5rp+yuJezo4Gsiwov3yKyjDoN7RtbDA5b03gX6DqWTTOrzhxLeMOQFd1akRHH08Trp7ShCJUw4BLdmfCxrsPnhuIQW9h+1sAMP6uHqUV+TrRW1vTWR8SH7BBtTsi/p/ZD2/7DbUk4696+/EJAAAA==")
          center / cover no-repeat;
      }
      .app-splash__bg {
        position: absolute;
        inset: 0;
        height: 100%;
        width: 100%;
        object-fit: cover;
        opacity: 0;
        transition: opacity 0.5s ease-out;
      }
      .app-splash__bg--loaded {
        opacity: 1;
      }
      /* Ripple rings centered on the splash in the artwork (the swim ring
         sits at ~56% height; object-fit keeps it near the viewport center
         on portrait screens). */
      .app-splash__ripples {
        position: absolute;
        left: 50%;
        top: 56%;
      }
      .app-splash__ripple {
        position: absolute;
        top: -5rem;
        left: -5rem;
        height: 10rem;
        width: 10rem;
        border-radius: 9999px;
        border: 3px solid rgba(255, 255, 255, 0.85);
        animation: app-splash-ripple 1.8s ease-out infinite;
      }
      .app-splash__ripple:nth-child(2) {
        animation-delay: 0.6s;
      }
      .app-splash__ripple:nth-child(3) {
        animation-delay: 1.2s;
      }
      .app-splash__word {
        position: relative;
        font-family:
          "Caveat Brush", "Bricolage Grotesque", system-ui, sans-serif;
        font-size: clamp(3.75rem, 15vw, 6rem);
        line-height: 1;
        color: #ffffff;
        transform: rotate(-3deg);
        text-shadow:
          0 2px 0 rgba(2, 100, 160, 0.4),
          0 8px 28px rgba(11, 72, 109, 0.55);
        animation: app-splash-fade 0.6s ease-out 0.2s both;
      }
      @keyframes app-splash-ripple {
        0% {
          transform: scale(0.3);
          opacity: 0.9;
        }
        100% {
          transform: scale(1.7);
          opacity: 0;
        }
      }
      @keyframes app-splash-fade {
        from {
          opacity: 0;
          transform: rotate(-3deg) translateY(8px);
        }
        to {
          opacity: 1;
          transform: rotate(-3deg);
        }
      }
    </style>

    <title>Badligan</title>
  </head>
  <body class="bg-sky-50">
    <div id="root">
      <div class="app-splash">
        <img
          class="app-splash__bg"
          src="/splash.webp"
          alt=""
          onload="this.classList.add('app-splash__bg--loaded')"
        />
        <div class="app-splash__ripples" aria-hidden="true">
          <span class="app-splash__ripple"></span>
          <span class="app-splash__ripple"></span>
          <span class="app-splash__ripple"></span>
        </div>
        <div class="app-splash__word">Badligan</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
