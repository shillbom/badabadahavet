name: Update water temperatures

on:
  # Once a day around lunchtime in Sweden (10:00 UTC = 12:00 CEST /
  # 11:00 CET — GitHub cron has no timezone support). Most baths only
  # update once a day, and the script skips places whose reading is
  # still fresh, so this keeps Firestore reads/writes to a minimum.
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

concurrency:
  group: update-temperatures
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Use Node 24
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Write service-account JSON
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Update temperatures
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        run: npm run update:temperatures -- --write
