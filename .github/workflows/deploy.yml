name: Build & deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel an in-flight run if a newer commit is pushed to the same branch.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    name: Build & deploy to Firebase Hosting
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Use Node 24
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_PERSPECTIVE_API_KEY: ${{ secrets.VITE_PERSPECTIVE_API_KEY }}
        run: npm run build

      # Deploy the client + Firestore/Storage rules via the Firebase CLI
      # (replaces the hosting-only action that 400'd on unchanged content).
      # Auth uses the service-account secret via GOOGLE_APPLICATION_CREDENTIALS.
      - name: Deploy hosting + rules
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"

          # Rules are idempotent (skip-if-unchanged), so deploy them directly.
          npx --yes firebase-tools@15 deploy --only firestore,storage \
            --project "$FIREBASE_PROJECT" --non-interactive --force

          # Hosting rejects re-releasing a byte-identical version with a 400
          # ("is the current active version"). That's a no-op, not a failure —
          # swallow only that specific case so an unchanged build stays green.
          set +e
          out=$(npx --yes firebase-tools@15 deploy --only hosting \
            --project "$FIREBASE_PROJECT" --non-interactive --force 2>&1)
          code=$?
          echo "$out"
          if [ $code -ne 0 ]; then
            if echo "$out" | grep -q "is the current active version"; then
              echo "Hosting already up to date — nothing to release."
            else
              exit $code
            fi
          fi

      # Functions deploy needs the deploy service account to have
      # "Service Account User" (iam.serviceAccounts.actAs) on the runtime SA
      # <project>@appspot.gserviceaccount.com, plus Cloud Functions / Cloud
      # Build / Artifact Registry roles. Until that's granted, deploy
      # functions manually:
      #   GOOGLE_APPLICATION_CREDENTIALS=./service-account.json \
      #     npx firebase-tools deploy --only functions --project badligan
      # Once the SA has the roles, set repo variable DEPLOY_FUNCTIONS=true
      # (Settings → Secrets and variables → Actions → Variables) to enable
      # the two steps below — no workflow edit needed.
      - name: Install functions dependencies
        if: vars.DEPLOY_FUNCTIONS == 'true'
        run: npm ci
        working-directory: functions

      - name: Deploy functions
        if: vars.DEPLOY_FUNCTIONS == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          npx --yes firebase-tools@15 deploy \
            --only functions \
            --project "$FIREBASE_PROJECT" \
            --non-interactive --force
