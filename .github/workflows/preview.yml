name: PR preview

on:
  pull_request:
    branches: [main]

# Forks can't read repo secrets — skip preview for them.
#
# Builds + type-checks + tests the PR, then deploys it to a Firebase Hosting
# preview channel (pr-<number>, auto-expires 7d) and comments the URL on the
# PR so changes can be tried on a real device before merge.
#
# Deploys via the Firebase CLI rather than action-hosting-deploy because the
# action 409/400'd on GitHub runners: flaky IPv6 routes to googleapis cause
# "premature close" errors, firebase-tools retries the dropped POSTs, and the
# already-succeeded create/release then errors. NODE_OPTIONS forces IPv4 to
# avoid that, and we tolerate the "already the current active version" no-op
# (same approach as deploy.yml).
#
# NOTE: preview URLs (badligan--pr-<n>-<hash>.web.app) are a different origin
# than prod. Login still works on them: the Firebase web API key has no
# HTTP-referrer restriction, and Firebase auto-adds preview-channel domains to
# Auth's authorized domains. (If the key is ever locked down to referrers,
# include `https://badligan--*.web.app/*` so previews keep working.)
jobs:
  preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v5

      - name: Use Node 24
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_PERSPECTIVE_API_KEY: ${{ secrets.VITE_PERSPECTIVE_API_KEY }}
        run: npm run build

