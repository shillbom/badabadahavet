name: PR preview

on:
  pull_request:
    branches: [main]

# Forks can't read repo secrets — skip preview for them.
#
# The "Deploy preview channel" step is currently disabled (commented out
# below) — we just build + type-check PRs here and try changes locally with
# `npm run dev` instead. To bring preview deploys back, uncomment that step
# (and restore the `pull-requests`/`checks` write permissions it needs).
jobs:
  preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Use Node 24
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: npm run build
      # Preview deploy disabled — re-enable by uncommenting and restoring the
      # `pull-requests: write` / `checks: write` job permissions above.
      #
      # - name: Deploy preview channel
      #   uses: FirebaseExtended/action-hosting-deploy@v0
      #   with:
      #     repoToken: ${{ secrets.GITHUB_TOKEN }}
      #     firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      #     projectId: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      #     # Preview channels auto-expire after 7 days.
      #     expires: 7d
